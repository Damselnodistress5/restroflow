<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RestroFlow Admin - Customer Feedback</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background-color: #2e2e2e;
            color: #fff;
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 2px solid #826cd7;
            margin-bottom: 20px;
        }

        .sidebar-header h2 {
            font-size: 20px;
            color: #826cd7;
        }

        .sidebar-header p {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        .sidebar-nav {
            list-style: none;
        }

        .sidebar-nav li {
            margin: 0;
        }

        .sidebar-nav a {
            display: block;
            padding: 15px 20px;
            color: #ccc;
            text-decoration: none;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background-color: rgba(130, 108, 215, 0.2);
            border-left-color: #826cd7;
            color: #826cd7;
        }

        .sidebar-footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            padding: 0 20px;
        }

        .logout-btn {
            width: 100%;
            padding: 12px;
            background-color: #826cd7;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: 600;
        }

        .logout-btn:hover {
            background-color: #6d51bb;
        }

        /* Main Content */
        .main-content {
            margin-left: 250px;
            padding: 30px;
            width: calc(100% - 250px);
            min-height: 100vh;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-header h1 {
            color: #333;
            font-size: 28px;
        }

        .sync-btn {
            padding: 10px 20px;
            background-color: #826cd7;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .sync-btn:hover {
            background-color: #6d51bb;
        }

        /* Feedback Wall Grid */
        .feedback-wall {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .feedback-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-top: 4px solid #826cd7;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .feedback-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .feedback-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .table-name {
            font-weight: 600;
            color: #333;
            font-size: 14px;
            background-color: #f5f5f5;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .star-rating {
            color: #826cd7;
            font-size: 20px;
            letter-spacing: 2px;
        }

        .feedback-comment {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin: 15px 0;
            font-style: italic;
        }

        .feedback-footer {
            border-top: 1px solid #e0e0e0;
            padding-top: 10px;
            font-size: 12px;
            color: #999;
        }

        .empty-message {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 16px;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <script>
        // Security Guard: Check if user is logged in
        if (!sessionStorage.getItem('isAdminLoggedIn')) {
            window.location.href = 'admin_login.html';
        }
    </script>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>RestroFlow</h2>
            <p>Admin Suite</p>
        </div>
        <ul class="sidebar-nav">
            <li><a href="admin_sales.html">Sales Dashboard</a></li>
            <li><a href="admin_feedback.html" class="active">Customer Feedback</a></li>
            <li><a href="admin_queries.html">Support Tickets</a></li>
            <li><a href="admin_menu.html">Menu Settings</a></li>
        </ul>
        <div class="sidebar-footer">
            <button class="logout-btn" onclick="logout()">Secure Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1>Customer Feedback Wall</h1>
            <button class="sync-btn" onclick="syncData()">Sync Live Data</button>
        </div>

        <!-- Feedback Grid -->
        <div class="feedback-wall" id="feedbackWall">
            <div class="empty-message">Loading feedback...</div>
        </div>
    </main>

    <script>
        function renderStars(rating) {
            const starCount = Math.max(0, Math.min(5, parseInt(rating, 10) || 0));
            return '*'.repeat(starCount) + '-'.repeat(5 - starCount);
        }

        async function loadFeedbackData() {
            const feedbackWall = document.getElementById('feedbackWall');
            feedbackWall.innerHTML = '<div class="empty-message">Loading feedback...</div>';

            try {
                const res = await fetch('/api/admin/feedback.php');
                const data = await res.json();
                if (!res.ok || !data.ok) {
                    throw new Error(data.message || 'Failed to load feedback');
                }

                const feedbacks = data.feedback || [];
                feedbackWall.innerHTML = '';

                if (feedbacks.length === 0) {
                    feedbackWall.innerHTML = '<div class="empty-message">No feedback data available yet.</div>';
                    return;
                }

                feedbacks.forEach(feedback => {
                    const card = document.createElement('div');
                    card.className = 'feedback-card';
                    card.innerHTML = `
                        <div class="feedback-header">
                            <span class="table-name">Table: ${feedback.table_name || 'N/A'}</span>
                            <div class="star-rating">${renderStars(feedback.star_rating)}</div>
                        </div>
                        <div class="feedback-comment" style="font-style:normal; margin-top:0;">
                            <strong>Customer:</strong> ${feedback.customer_name || 'Guest'}<br>
                            <strong>Contact:</strong> ${feedback.customer_phone || feedback.customer_email || 'N/A'}
                        </div>
                        <div class="feedback-comment">"${feedback.comment || 'No comment provided'}"</div>
                        <div class="feedback-footer">
                            ${feedback.date || 'Date not recorded'}
                        </div>
                    `;
                    feedbackWall.appendChild(card);
                });
            } catch (err) {
                feedbackWall.innerHTML = '<div class="empty-message">Unable to load feedback right now.</div>';
            }
        }

        async function syncData() {
            await loadFeedbackData();
            const syncBtn = event.target;
            syncBtn.textContent = 'Synced';
            setTimeout(() => {
                syncBtn.textContent = 'Sync Live Data';
            }, 1500);
        }
        function logout() {
            sessionStorage.clear();
            window.location.href = 'home_page.html';
        }

        // Load data on page load
        window.addEventListener('DOMContentLoaded', loadFeedbackData);
    </script>
</body>
</html>
