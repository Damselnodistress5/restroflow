<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RestroFlow | Premium Dining</title>

  <style>
    :root{
      --primary:#826cd7;
      --text:#2e2e2e;
      --muted:#5a5f64;
      --bg:#fff8f3;
      --white:#ffffff;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: 'Playfair Display', serif, Arial;
      background:var(--bg);
      color:var(--text);
      line-height:1.6;
    }

    /* Transparent Header */
    header{
      background:rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      position:fixed;
      width: 100%;
      top:0;
      z-index: 100;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .container{
      max-width:1200px;
      margin:auto;
      padding:0 24px;
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      height: 80px;
    }

    .nav-left{ display:flex; align-items:center; gap:12px; }
    .nav-right{ display:flex; align-items:center; gap:20px; }

    .hamburger{
      width:40px; height:36px; display:inline-flex; align-items:center; justify-content:center;
      background:transparent; border:0; cursor:pointer; padding:6px; border-radius:8px;
    }
    .hamburger .bar{ width:22px; height:2px; background:var(--text); display:block; position:relative; }
    .hamburger .bar::before, .hamburger .bar::after{ content:''; position:absolute; left:0; right:0; height:2px; background:inherit; }
    .hamburger .bar::before{ top:-7px; }
    .hamburger .bar::after{ top:7px; }

    .auth-btn{ 
      text-decoration: none;
      padding:10px 24px; 
      border-radius:99px; 
      border:1.5px solid var(--primary); 
      background:transparent; 
      color:var(--primary);
      cursor:pointer; 
      font-weight:700; 
      transition: 0.3s;
    }
    .auth-btn.primary{ background:var(--primary); color:#fff; border:0; }
    .auth-btn:hover{ transform: scale(1.05); opacity: 0.9; }

    /* Hero Section using your pic_restaurant.jpg */
    .hero{
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      /* Dark overlay + your local image file */
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                  url('pic_restaurant.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: var(--white);
      padding-top: 80px;
    }

    .hero-content{ max-width: 800px; }
    .hero h2{
      font-size: 4rem;
      margin: 0;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.1;
    }
    .hero p{
      font-size: 1.2rem;
      margin: 20px 0 30px;
      opacity: 0.9;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .btn-main{
      display:inline-block;
      padding:18px 40px;
      border-radius:999px;
      background:var(--primary);
      color:var(--white);
      font-weight:700;
      text-decoration:none;
      font-size: 1.1rem;
      box-shadow: 0 10px 20px rgba(130, 108, 215, 0.3);
      transition: 0.3s;
    }
    .btn-main:hover{ transform: translateY(-3px); box-shadow: 0 15px 30px rgba(130, 108, 215, 0.4); }

    /* Side Menu */
    .menu-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.5); opacity:0; pointer-events:none; transition:0.3s; z-index: 1000;}
    .menu-overlay.show{ opacity:1; pointer-events:auto; }
    .side-menu{
      position:fixed; left:0; top:0; height:100%; width:320px; background:#fff; box-shadow:5px 0 30px rgba(0,0,0,0.1);
      transform:translateX(-110%); transition:0.4s cubic-bezier(0.4, 0, 0.2, 1); padding:40px; z-index:1001;
      display:flex; flex-direction:column;
    }
    .side-menu.show{ transform:translateX(0); }
    .side-menu h3{ margin-bottom: 30px; color:var(--primary); font-size: 1.5rem; border-bottom: 2px solid var(--bg); padding-bottom: 10px;}
    .side-menu a{ color:var(--text); text-decoration:none; padding:15px 0; font-size: 1.1rem; font-weight: 600; border-bottom: 1px solid #f0f0f0; transition: 0.2s;}
    .side-menu a:hover{ color:var(--primary); padding-left: 10px; }

    /* Footer */
    footer{
      background:#2e2e2e;
      padding:40px 0;
      text-align:center;
      color: rgba(255,255,255,0.6);
    }

    @media (max-width: 768px) {
      .hero h2{ font-size: 2.5rem; }
    }
  </style>
</head>

<body>
  <header>
    <div class="container">
      <nav>
        <div class="nav-left">
          <button class="hamburger" id="hamburger">
            <span class="bar"></span>
          </button>
        </div>

        <div class="nav-right">
          <a class="auth-btn" href="login.html">Log in</a>
          <a class="auth-btn primary" href="signup.html">Join Us</a>
        </div>
      </nav>
    </div>
  </header>

  <div id="menuOverlay" class="menu-overlay"></div>
  <aside id="sideMenu" class="side-menu">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h3>Explore</h3>
      <button id="menuClose" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
    </div>
    <a href="dine.html">Book a Table</a>
    <a href="order.html">Online Ordering</a>
    <a href="restaurants.html">Our Locations</a>
    <a href="special_features.html">Loyalty Rewards</a>
    <a href="billing.html">Quick Pay</a>
    <a href="feedback.html">Give Feedback</a>
    <a href="raise_query.html">Support</a>
  </aside>

  <main>
    <section class="hero">
      <div class="hero-content">
        <p>Experience the Art of Dining</p>
        <h2>Exquisite Flavors,<br>Unforgettable Memories.</h2>
        <br>
        <a href="dine.html" class="btn-main">Start Your Experience</a>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 RestroFlow. Crafted for the finest tastes.</p>
    </div>
  </footer>

<script>
  (function(){
    const hamburger = document.getElementById('hamburger');
    const sideMenu = document.getElementById('sideMenu');
    const overlay = document.getElementById('menuOverlay');
    const closeBtn = document.getElementById('menuClose');

    function openMenu(){
      sideMenu.classList.add('show'); overlay.classList.add('show');
      document.body.style.overflow = 'hidden';
    }
    function closeMenu(){
      sideMenu.classList.remove('show'); overlay.classList.remove('show');
      document.body.style.overflow = '';
    }

    hamburger.addEventListener('click', openMenu);
    overlay.addEventListener('click', closeMenu);
    closeBtn.addEventListener('click', closeMenu);

    document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closeMenu(); });
  })();
</script>

</body>
</html>
