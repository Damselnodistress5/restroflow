<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RestroFlow Admin - Sales Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background-color: #2e2e2e;
            color: #fff;
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 2px solid #826cd7;
            margin-bottom: 20px;
        }

        .sidebar-header h2 {
            font-size: 20px;
            color: #826cd7;
        }

        .sidebar-header p {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        .sidebar-nav {
            list-style: none;
        }

        .sidebar-nav li {
            margin: 0;
        }

        .sidebar-nav a {
            display: block;
            padding: 15px 20px;
            color: #ccc;
            text-decoration: none;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background-color: rgba(130, 108, 215, 0.2);
            border-left-color: #826cd7;
            color: #826cd7;
        }

        .sidebar-footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            padding: 0 20px;
        }

        .logout-btn {
            width: 100%;
            padding: 12px;
            background-color: #826cd7;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: 600;
        }

        .logout-btn:hover {
            background-color: #6d51bb;
        }

        /* Main Content */
        .main-content {
            margin-left: 250px;
            padding: 30px;
            width: calc(100% - 250px);
            min-height: 100vh;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-header h1 {
            color: #333;
            font-size: 28px;
        }

        .sync-btn {
            padding: 10px 20px;
            background-color: #826cd7;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .sync-btn:hover {
            background-color: #6d51bb;
        }

        .kpi-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #826cd7;
        }

        .kpi-card h3 {
            color: #666;
            font-size: 13px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .kpi-card .value {
            color: #826cd7;
            font-size: 32px;
            font-weight: 700;
        }

        .table-section {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        .table-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #f5f5f5;
        }

        th {
            padding: 15px;
            text-align: left;
            color: #333;
            font-weight: 600;
            border-bottom: 2px solid #e0e0e0;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            color: #555;
            font-size: 14px;
        }

        tr:hover {
            background-color: #fafafa;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <script>
        // Security Guard: Check if user is logged in
        if (!sessionStorage.getItem('isAdminLoggedIn')) {
            window.location.href = 'admin_login.html';
        }
    </script>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>RestroFlow</h2>
            <p>Admin Suite</p>
        </div>
        <ul class="sidebar-nav">
            <li><a href="admin_sales.html" class="active">Sales Dashboard</a></li>
            <li><a href="admin_feedback.html">Customer Feedback</a></li>
            <li><a href="admin_queries.html">Support Tickets</a></li>
            <li><a href="admin_menu.html">Menu Settings</a></li>
        </ul>
        <div class="sidebar-footer">
            <button class="logout-btn" onclick="logout()">Secure Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1>Sales Dashboard</h1>
            <button class="sync-btn" onclick="syncData()">Sync Live Data</button>
        </div>

        <!-- KPI Cards -->
        <div class="kpi-container">
            <div class="kpi-card">
                <h3>Total Lifetime Revenue</h3>
                <div class="value" id="totalRevenue">$0.00</div>
            </div>
            <div class="kpi-card">
                <h3>Total Orders</h3>
                <div class="value" id="totalOrders">0</div>
            </div>
        </div>

        <!-- Sales Table -->
        <div class="table-section">
            <h2>Order History</h2>
            <table id="salesTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Order ID</th>
                        <th>Table Name</th>
                        <th>Customer</th>
                        <th>Contact</th>
                        <th>Grand Total</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" class="empty-message">No sales data available. Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        async function loadSalesData() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '<tr><td colspan="6" class="empty-message">Loading sales data...</td></tr>';
            try {
                const res = await fetch('/api/admin/sales.php');
                const data = await res.json();
                if (!res.ok || !data.ok) {
                    throw new Error(data.message || 'Failed to load sales data');
                }

                const orders = data.orders || [];
                let totalRevenue = 0;
                tableBody.innerHTML = '';

                if (orders.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="6" class="empty-message">No sales data available yet.</td></tr>';
                    document.getElementById('totalRevenue').textContent = '$0.00';
                    document.getElementById('totalOrders').textContent = '0';
                    return;
                }

                orders.forEach(order => {
                    const grandTotal = parseFloat(order.grand_total) || 0;
                    totalRevenue += grandTotal;

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${order.date || 'N/A'}</td>
                        <td>#${order.order_id || 'N/A'}</td>
                        <td>${order.table_name || 'N/A'}</td>
                        <td>${order.customer_name || 'Guest'}</td>
                        <td>${order.customer_phone || order.customer_email || 'N/A'}</td>
                        <td>$${grandTotal.toFixed(2)}</td>
                    `;
                    tableBody.appendChild(row);
                });

                document.getElementById('totalRevenue').textContent = `$${totalRevenue.toFixed(2)}`;
                document.getElementById('totalOrders').textContent = orders.length.toString();
            } catch (err) {
                tableBody.innerHTML = '<tr><td colspan="6" class="empty-message">Unable to load sales data.</td></tr>';
                document.getElementById('totalRevenue').textContent = '$0.00';
                document.getElementById('totalOrders').textContent = '0';
            }
        }

        async function syncData() {
            await loadSalesData();
            const syncBtn = event.target;
            syncBtn.textContent = 'Synced';
            setTimeout(() => {
                syncBtn.textContent = 'Sync Live Data';
            }, 1500);
        }
        function logout() {
            sessionStorage.clear();
            window.location.href = 'home_page.html';
        }

        // Load data on page load
        window.addEventListener('DOMContentLoaded', loadSalesData);
    </script>
</body>
</html>
