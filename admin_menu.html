<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RestroFlow Admin - Menu Settings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background-color: #2e2e2e;
            color: #fff;
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 2px solid #826cd7;
            margin-bottom: 20px;
        }

        .sidebar-header h2 {
            font-size: 20px;
            color: #826cd7;
        }

        .sidebar-header p {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        .sidebar-nav {
            list-style: none;
        }

        .sidebar-nav li {
            margin: 0;
        }

        .sidebar-nav a {
            display: block;
            padding: 15px 20px;
            color: #ccc;
            text-decoration: none;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background-color: rgba(130, 108, 215, 0.2);
            border-left-color: #826cd7;
            color: #826cd7;
        }

        .sidebar-footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            padding: 0 20px;
        }

        .logout-btn {
            width: 100%;
            padding: 12px;
            background-color: #826cd7;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: 600;
        }

        .logout-btn:hover {
            background-color: #6d51bb;
        }

        /* Main Content */
        .main-content {
            margin-left: 250px;
            padding: 30px;
            width: calc(100% - 250px);
            min-height: 100vh;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-header h1 {
            color: #333;
            font-size: 28px;
        }

        .sync-btn {
            padding: 10px 20px;
            background-color: #826cd7;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .sync-btn:hover {
            background-color: #6d51bb;
        }

        .table-section {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        .table-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #f5f5f5;
        }

        th {
            padding: 15px;
            text-align: left;
            color: #333;
            font-weight: 600;
            border-bottom: 2px solid #e0e0e0;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            color: #555;
            font-size: 14px;
        }

        tr:hover {
            background-color: #fafafa;
        }

        /* Toggle Switch */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #826cd7;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .toggle-label {
            font-size: 13px;
            color: #666;
            margin-left: 10px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-in-stock {
            background-color: #c8e6c9;
            color: #2e7d32;
        }

        .status-sold-out {
            background-color: #ffcccc;
            color: #c62828;
        }

        /* Price Edit Modal */
        .price-input {
            width: 80px;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
        }

        .edit-price-btn {
            padding: 6px 12px;
            background-color: #826cd7;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: background-color 0.3s;
            margin-right: 5px;
        }

        .edit-price-btn:hover {
            background-color: #6d51bb;
        }

        .save-price-btn {
            padding: 6px 12px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .save-price-btn:hover {
            background-color: #45a049;
        }

        .cancel-price-btn {
            padding: 6px 12px;
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .cancel-price-btn:hover {
            background-color: #da190b;
        }

        /* Admin form styles */
        .form-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .form-group {
            flex: 1;
            min-width: 180px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #444;
        }

        .form-group input,
        .form-group select {
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid rgba(0, 0, 0, 0.18);
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #826cd7;
            box-shadow: 0 0 0 3px rgba(130, 108, 215, 0.12);
        }

        .delete-btn {
            padding: 6px 12px;
            background-color: #e53935;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .delete-btn:hover {
            background-color: #c62828;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 16px;
        }
    </style>
</head>

    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1>Menu Management</h1>
            <div>
                <button class="sync-btn" onclick="syncData()">Sync Live Data</button>
                <button class="sync-btn" onclick="resetToDefaults()">Restore Defaults</button>
            </div>
        </div>

        <!-- Menu Table -->
        <div class="table-section">
            <h2>Menu Items</h2>

            <div class="form-row" style="margin-bottom: 24px;">
                <div class="form-group">
                    <label for="newName">Item Name</label>
                    <input id="newName" placeholder="e.g. Chole Bhature" />
                </div>
                <div class="form-group">
                    <label for="newCategory">Category</label>
                    <input id="newCategory" placeholder="e.g. North Indian" />
                </div>
                <div class="form-group">
                    <label for="newPrice">Price</label>
                    <input id="newPrice" type="number" min="0" step="0.01" placeholder="e.g. 199" />
                </div>
                <div class="form-group" style="align-items:flex-end;">
                    <button class="sync-btn" style="width: 100%;" onclick="addMenuItem()">+ Add Item</button>
                </div>
            </div>

            <table id="menuTable">
                <thead>
                    <tr>
                        <th>Item Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Availability</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="4" class="empty-message">No menu items available. Loading...</td></tr>
                </tbody>
            </table>

    <script>
        async function toggleAvailability(itemId, currentState) {
            try {
                const res = await fetch('/api/admin/menu_item.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'toggle', item_id: itemId, is_active: !currentState })
                });
                const data = await res.json();
                if (!res.ok || !data.ok) {
                    throw new Error(data.message || 'Failed to update availability');
                }
                await loadMenuData();
            } catch (err) {
                alert(err.message || 'Failed to update availability');
            }
        }

        async function editPrice(itemId) {
            const row = document.querySelector(`[data-item-id="${itemId}"]`);
            if (!row) return;
            const priceCell = row.querySelector('.price-cell');
            const currentPrice = priceCell.getAttribute('data-price') || '0.00';

            priceCell.innerHTML = `
                <input type="number" class="price-input" id="priceInput${itemId}" value="${currentPrice}" step="0.01" min="0">
                <button class="save-price-btn" onclick="savePrice(${itemId})">Save</button>
                <button class="cancel-price-btn" onclick="loadMenuData()">Cancel</button>
            `;

            document.getElementById(`priceInput${itemId}`).focus();
        }

        async function savePrice(itemId) {
            const input = document.getElementById(`priceInput${itemId}`);
            if (!input) return;
            const newPrice = parseFloat(input.value) || 0;

            try {
                const res = await fetch('/api/admin/menu_item.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'update_price', item_id: itemId, price: newPrice })
                });
                const data = await res.json();
                if (!res.ok || !data.ok) {
                    throw new Error(data.message || 'Failed to update price');
                }
                await loadMenuData();
            } catch (err) {
                alert(err.message || 'Failed to update price');
            }
        }

        async function deleteItem(itemId) {
            try {
                const res = await fetch('/api/admin/menu_item.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'delete', item_id: itemId })
                });
                const data = await res.json();
                if (!res.ok || !data.ok) {
                    throw new Error(data.message || 'Failed to remove item');
                }
                await loadMenuData();
            } catch (err) {
                alert(err.message || 'Failed to remove item');
            }
        }

        async function addMenuItem() {
            const name = document.getElementById('newName').value.trim();
            const category = document.getElementById('newCategory').value.trim();
            const price = parseFloat(document.getElementById('newPrice').value);

            if (!name || !category || isNaN(price)) {
                alert('Please enter a valid name, category, and price.');
                return;
            }

            try {
                const res = await fetch('/api/admin/menu_item.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'add', name, category, price })
                });
                const data = await res.json();
                if (!res.ok || !data.ok) {
                    throw new Error(data.message || 'Failed to add item');
                }

                document.getElementById('newName').value = '';
                document.getElementById('newCategory').value = '';
                document.getElementById('newPrice').value = '';
                await loadMenuData();
            } catch (err) {
                alert(err.message || 'Failed to add item');
            }
        }

        async function loadMenuData() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '<tr><td colspan="4" class="empty-message">Loading menu data...</td></tr>';

            try {
                const res = await fetch('/api/admin/menu.php');
                const data = await res.json();
                if (!res.ok || !data.ok) {
                    throw new Error(data.message || 'Failed to load menu');
                }

                const menuItems = data.menu || [];
                tableBody.innerHTML = '';

                if (menuItems.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" class="empty-message">No menu items available yet.</td></tr>';
                    return;
                }

                menuItems.forEach((item) => {
                    const row = document.createElement('tr');
                    row.setAttribute('data-item-id', item.item_id);

                    const isAvailable = item.isAvailable !== false;
                    const statusBadge = isAvailable
                        ? '<span class="status-badge status-in-stock">In Stock</span>'
                        : '<span class="status-badge status-sold-out">Sold Out</span>';

                    const priceValue = parseFloat(item.price || 0).toFixed(2);
                    row.innerHTML = `
                        <td><strong>${item.name || 'N/A'}</strong></td>
                        <td>${item.category || 'Uncategorized'}</td>
                        <td>
                            <div class="price-cell" data-price="${priceValue}">
                                $${priceValue}
                                <button class="edit-price-btn" onclick="editPrice(${item.item_id})">Edit</button>
                                <button class="delete-btn" onclick="deleteItem(${item.item_id})">Remove</button>
                            </div>
                        </td>
                        <td>
                            <label class="toggle-switch">
                                <input type="checkbox" ${isAvailable ? 'checked' : ''} onchange="toggleAvailability(${item.item_id}, ${isAvailable})">
                                <span class="slider"></span>
                            </label>
                            <span class="toggle-label">${statusBadge}</span>
                        </td>
                    `;

                    tableBody.appendChild(row);
                });
            } catch (err) {
                tableBody.innerHTML = '<tr><td colspan="4" class="empty-message">Unable to load menu data.</td></tr>';
            }
        }

        async function syncData() {
            await loadMenuData();
            const syncBtn = event.target;
            syncBtn.textContent = 'Synced';
            setTimeout(() => {
                syncBtn.textContent = 'Sync Live Data';
            }, 1500);
        }
        function logout() {
            sessionStorage.clear();
            window.location.href = 'home_page.html';
        }

        // Load data on page load
        window.addEventListener('DOMContentLoaded', loadMenuData);
    </script>
</body>
</html>
