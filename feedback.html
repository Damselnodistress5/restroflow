<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Feedback: RestroFlow</title>
  <style>
    :root{--primary:#826cd7;--bg:#fff8f3;--text:#2e2e2e;--success:#067a3b;--star:#eab308}
    body{font-family:Arial,Helvetica,sans-serif;margin:0;background:var(--bg);color:var(--text)}
    .container{max-width:500px;margin:40px auto;padding:16px;}
    
    h1{margin:0 0 8px;font-size:1.8rem;text-align:center;color:var(--primary)}
    p.subtitle{text-align:center;color:#6b6b6b;margin-bottom:24px;}
    
    .card{background:#fff;padding:24px;border-radius:12px;border:1px solid rgba(0,0,0,0.06);box-shadow:0 4px 16px rgba(0,0,0,0.05)}
    
    /* Pure CSS Star Rating System */
    .rating-group{margin-bottom:20px; background: #f7f7fb; padding: 16px; border-radius: 8px;}
    .rating-label{font-weight:bold;margin-bottom:8px;display:block; text-align: center; color: var(--primary);}
    .stars{display:flex;gap:8px;flex-direction:row-reverse;justify-content:center;}
    .stars input{display:none;}
    .stars label{font-size:2.5rem;color:#ddd;cursor:pointer;transition:color 0.2s; margin: 0;}
    .stars label:hover, .stars label:hover ~ label, .stars input:checked ~ label{color:var(--star);}
    
    textarea{width:100%;padding:12px;border-radius:8px;border:1px solid rgba(0,0,0,0.1);font-family:inherit;font-size:1rem;resize:vertical;min-height:100px;box-sizing:border-box;margin-bottom:20px;}
    textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(130,108,215,0.2);}
    
    .btn{width:100%;padding:14px;border-radius:8px;border:0;background:var(--primary);color:#fff;font-size:1.1rem;font-weight:bold;cursor:pointer;transition:background 0.2s;}
    .btn:hover{background:#6b56b8;}
    
    /* Success State */
    .success-state{display:none;text-align:center;padding:20px 0;}
    .success-icon{font-size:4rem;margin-bottom:16px;}
    .success-state h2 {color: var(--success); margin-bottom: 8px;}
  </style>
</head>
<body>
  <div class="container">
    
    <div class="card" id="feedbackFormCard">
      <h1>How was your meal?</h1>
      <p class="subtitle" id="tableGreeting">We hope you enjoyed your time at RestroFlow.</p>
      
      <form id="feedbackForm">
        <div class="rating-group">
          <span class="rating-label">Rate the Food</span>
          <div class="stars">
            <input type="radio" id="food5" name="foodRate" value="5"><label for="food5">★</label>
            <input type="radio" id="food4" name="foodRate" value="4"><label for="food4">★</label>
            <input type="radio" id="food3" name="foodRate" value="3"><label for="food3">★</label>
            <input type="radio" id="food2" name="foodRate" value="2"><label for="food2">★</label>
            <input type="radio" id="food1" name="foodRate" value="1"><label for="food1">★</label>
          </div>
        </div>

        <div class="rating-group">
          <span class="rating-label">Rate the Service</span>
          <div class="stars">
            <input type="radio" id="serv5" name="servRate" value="5"><label for="serv5">★</label>
            <input type="radio" id="serv4" name="servRate" value="4"><label for="serv4">★</label>
            <input type="radio" id="serv3" name="servRate" value="3"><label for="serv3">★</label>
            <input type="radio" id="serv2" name="servRate" value="2"><label for="serv2">★</label>
            <input type="radio" id="serv1" name="servRate" value="1"><label for="serv1">★</label>
          </div>
        </div>

        <label for="comments" style="font-weight:bold; display:block; margin-bottom:8px;">Any suggestions for us?</label>
        <textarea id="comments" placeholder="Tell us what you loved, or what we can improve..."></textarea>
        
        <button type="button" class="btn" onclick="submitFeedback()">Submit Feedback</button>
      </form>
    </div>

    <div class="card success-state" id="successCard">
      <div class="success-icon">✨</div>
      <h2>Thank You!</h2>
      <p style="color:#666; margin-bottom: 24px;">Your feedback helps us serve you better. We hope to see you again soon!</p>
      <button class="btn" onclick="finishAndGoHome()" style="background:var(--success)">Return to Home</button>
    </div>

  </div>

  <script>
    // Personalize the greeting if they have a table saved
    window.onload = () => {
      const currentTable = localStorage.getItem('current_table');
      if (currentTable) {
        document.getElementById('tableGreeting').textContent = `Thanks for dining at ${currentTable}. How did we do?`;
      }
    };

    async function submitFeedback() {
      const foodRate = document.querySelector('input[name=\"foodRate\"]:checked');
      const servRate = document.querySelector('input[name=\"servRate\"]:checked');
      const comments = document.getElementById('comments').value.trim();
      const currentUser = JSON.parse(localStorage.getItem('current_user') || 'null');
      const orderCode = localStorage.getItem('last_paid_order_code') || localStorage.getItem('current_order_code') || null;

      if (!foodRate || !servRate) {
        alert('Please rate both food and service.');
        return;
      }

      try {
        const res = await fetch('/api/feedback.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            order_code: orderCode,
            user_id: currentUser && currentUser.user_id ? currentUser.user_id : null,
            food_rating: Number(foodRate.value),
            service_rating: Number(servRate.value),
            comments
          })
        });
        const data = await res.json();
        if (!res.ok || !data.ok) {
          throw new Error(data.message || 'Failed to submit feedback');
        }

        document.getElementById('feedbackFormCard').style.display = 'none';
        document.getElementById('successCard').style.display = 'block';
      } catch (err) {
        alert(err.message || 'Failed to submit feedback');
      }
    }

    function finishAndGoHome() {
      // Clear the table session so the next customer starts fresh
      localStorage.removeItem('current_table');
      localStorage.removeItem('current_order_code');
      
      // Redirect back to the starting point
      window.location.href = 'home_page.html';
    }
  </script>
</body>
</html>
